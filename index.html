<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Edge - Global Network UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'MyanmarSagar';
            src: url('https://raw.githubusercontent.com/tta1873/tta1873.github.io/e3eaa3afa28bfe51e8f8f638201b05e2f1a4120c/MyanmarSagar.ttf') format('truetype');
        }

        :root {
            --bg-deep: #050505;
            --accent-green: #22c55e;
            --dark-surface: #121212;
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-deep);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', 'MyanmarSagar', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Hero Container */
        .hero-banner {
            position: relative;
            width: 100%;
            height: 58vh;
            background: radial-gradient(circle at 50% 50%, #064e3b 0%, #022c22 45%, #050505 100%);
            border-bottom-left-radius: 45px;
            border-bottom-right-radius: 45px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }

        /* --- World Map Effect --- */
        .map-container {
            position: absolute;
            inset: 0;
            opacity: 0.4;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .world-map-svg {
            width: 140%;
            height: auto;
            fill: rgba(34, 197, 94, 0.1);
            stroke: rgba(34, 197, 94, 0.2);
            stroke-width: 0.5;
            transform: scale(1.2);
        }

        .node {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--accent-green), 0 0 20px rgba(34, 197, 94, 0.5);
            animation: node-pulse 3s infinite ease-in-out;
        }

        @keyframes node-pulse {
            0%, 100% { transform: scale(0.8); opacity: 0.4; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        /* Branding Info */
        .brand-footer {
            position: absolute;
            bottom: 35px;
            left: 30px;
            z-index: 20;
        }

        .brand-main {
            font-size: 2.8rem;
            font-weight: 800;
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: -2px;
            color: white;
        }

        .brand-detail {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 14px;
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
        }

        .dot { 
            width: 6px; 
            height: 6px; 
            background: var(--accent-green); 
            border-radius: 50%; 
            box-shadow: 0 0 10px var(--accent-green); 
            animation: blink 1.5s infinite; 
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Location Styling */
        .location-wrapper {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 10px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
        }

        .loc-icon {
            color: var(--accent-green);
            animation: bounce-slight 2s infinite ease-in-out;
        }

        @keyframes bounce-slight {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-2px); }
        }

        /* Stats Section */
        .stats-grid {
            padding: 28px 24px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-top: -20px;
            position: relative;
            z-index: 30;
        }

        .stat-card {
            background: var(--dark-surface);
            border-radius: 28px;
            padding: 22px;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 135px;
            transition: 0.3s;
        }

        .stat-label {
            font-size: 0.65rem;
            font-weight: 800;
            color: #525252;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-number {
            font-size: 2.8rem;
            font-weight: 900;
            line-height: 1;
            margin-top: 15px;
            align-self: flex-end;
            color: #ffffff;
        }

        /* Bottom Tab Bar */
        .tab-bar {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            background: rgba(18, 18, 18, 0.9);
            backdrop-filter: blur(25px);
            border-radius: 35px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.06);
            z-index: 100;
        }

        .tab-item { color: #404040; transition: 0.3s; padding: 10px; }
        .tab-item.active { color: var(--accent-green); }

        .center-action {
            background: var(--accent-green);
            width: 54px;
            height: 54px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(45deg);
            margin-top: -45px;
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.3);
        }

        .center-action svg { transform: rotate(-45deg); }

    </style>
</head>
<body>

    <!-- Hero Section -->
    <div class="hero-banner">
        <!-- World Map Background -->
        <div class="map-container">
            <svg class="world-map-svg" viewBox="0 0 1000 500">
                <rect x="0" y="0" width="1000" height="500" fill="url(#mapDots)" />
                <defs>
                    <pattern id="mapDots" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
                        <circle cx="2" cy="2" r="1" fill="rgba(34, 197, 94, 0.15)" />
                    </pattern>
                </defs>
            </svg>
            
            <!-- Random Glowing Points (Server Nodes) -->
            <div class="node" style="top: 30%; left: 25%;"></div>
            <div class="node" style="top: 45%; left: 70%;"></div>
            <div class="node" style="top: 60%; left: 40%;"></div>
            <div class="node" style="top: 25%; left: 80%;"></div>
            <div class="node" style="top: 70%; left: 15%;"></div>
            <div class="node" style="top: 50%; left: 55%;"></div>
        </div>
        
        <!-- Branding -->
        <div class="brand-footer">
            <div class="brand-main">BLUE EDGE<br>NETWORK</div>
            <div class="brand-detail">
                <div class="flex items-center gap-2">
                    <div class="dot"></div>
                    <span class="text-green-500 uppercase tracking-widest text-[0.65rem]">System Online</span>
                </div>
                <span class="opacity-30">|</span>
                <div class="location-wrapper">
                    <svg class="loc-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                    <span>YANGON, MM</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">BASIC PLAN<br>ACTIVE USERS</div>
            <div class="stat-number">X6</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">PREMIUM<br>SERVERS</div>
            <div class="stat-number">X2</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">MONTHLY<br>BANDWIDTH</div>
            <div class="stat-number">X4</div>
        </div>
        <div class="stat-card" style="border-color: rgba(34, 197, 94, 0.2);">
            <div class="stat-label text-green-700">NETWORK<br>RANKING</div>
            <div class="stat-number text-green-500">V1</div>
        </div>

        <div class="h-32 col-span-2"></div>
    </div>

    <!-- Bottom Navigation -->
    <div class="tab-bar">
        <button class="tab-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L2 12h3v8h6v-6h2v6h6v-8h3L12 3z"/></svg>
        </button>
        <button class="tab-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </button>
        
        <button class="center-action">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        
        <button class="tab-item active">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </button>
        <button class="tab-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </button>
    </div>

</body>
</html>
