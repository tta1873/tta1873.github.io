<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern App Landing Page</title>
    <style>
        /* အခြေခံ Setting များ */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0b0e14; /* Dark Background */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 900px;
            padding: 20px;
        }

        /* ခေါင်းစဉ်ပိုင်း */
        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #ffffff, #888888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.2rem;
            color: #a0a0a0;
            margin-bottom: 40px;
        }

        /* Download ခလုတ်များ */
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            background-color: #ffffff;
            color: #000000;
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s ease;
        }

        .btn:hover {
            background-color: #e0e0e0;
            transform: translateY(-3px);
        }

        .btn-secondary {
            background-color: #1f2229;
            color: #ffffff;
            border: 1px solid #333;
        }

        .btn-secondary:hover {
            background-color: #2d313a;
        }

        /* App Mockup (ပုံပြသသည့်နေရာ) */
        .mockup {
            margin-top: 60px;
            width: 100%;
            max-width: 700px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Perseus TV Experience</h1>
        <p>အကောင်းဆုံး ရုပ်သံလိုင်းများကို တစ်နေရာတည်းတွင် ကြည့်ရှုလိုက်ပါ။</p>

        <div class="btn-group">
            <a href="#" class="btn">Download for Android</a>
            <a href="#" class="btn btn-secondary">Learn More</a>
        </div>

        <img src=cc8b17ca8048f658f0d9183ce498b53b.jpg" alt="App Screenshot" class="mockup">
    </div>

</body>
</html>
