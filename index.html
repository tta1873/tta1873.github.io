<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLUE EDGE - Horizontal Pricing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Oswald:wght@700&family=Padauk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Padauk', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .price-font {
            font-family: 'Oswald', sans-serif;
            letter-spacing: -0.05em;
            line-height: 0.8;
        }

        .gradient-bg {
            background: radial-gradient(circle at top right, #1e3a8a 0%, #020617 70%);
        }

        /* Horizontal Scroll for Mobile */
        .pricing-container {
            display: flex;
            overflow-x: auto;
            gap: 1.5rem;
            padding: 1rem 0.5rem 2rem 0.5rem;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        /* Hide scrollbar but keep functionality */
        .pricing-container::-webkit-scrollbar {
            display: none;
        }

        .pricing-card {
            flex: 0 0 320px; /* Fixed width for horizontal layout */
            scroll-snap-align: center;
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 40px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 520px;
            transition: all 0.3s ease;
        }

        @media (min-width: 1024px) {
            .pricing-container {
                justify-content: center;
                overflow-x: visible;
            }
            .pricing-card {
                flex: 0 0 360px;
            }
        }

        .pricing-card:hover {
            border-color: #3b82f6;
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }

        .currency-text {
            font-size: 1.5rem;
            color: #94a3b8;
            margin-left: 5px;
            font-weight: 700;
        }
    </style>
</head>
<body class="gradient-bg min-h-screen">

    <!-- Nav -->
    <nav class="flex justify-between items-center px-8 py-6 max-w-7xl mx-auto">
        <div class="text-2xl font-black tracking-tighter text-white">
            BLUE <span class="text-blue-500">EDGE</span>
        </div>
        <a href="#" class="bg-blue-600/10 border border-blue-500/30 px-6 py-2 rounded-full text-sm font-semibold">
            အကူအညီယူရန် <i class="fab fa-telegram-plane ml-1"></i>
        </a>
    </nav>

    <!-- Header Section -->
    <section class="text-center py-10 px-6">
        <h1 class="text-4xl md:text-6xl font-black text-white mb-4 uppercase">PROTOCOL Pricing</h1>
        <p class="text-slate-400 max-w-xl mx-auto">အမြန်ဆုံးနဲ့ စိတ်အချရဆုံး VPN ဝန်ဆောင်မှုများအတွက် သင်နဲ့ကိုက်ညီမယ့် Plan ကို ရွေးချယ်ပါ။</p>
    </section>

    <!-- Pricing Horizontal Section -->
    <section class="max-w-[1400px] mx-auto px-4 overflow-hidden">
        <div class="pricing-container">
            
            <!-- Card 1: Basic -->
            <div class="pricing-card">
                <div class="flex justify-between items-start">
                    <span class="text-slate-400 font-bold uppercase text-xs tracking-widest">Basic Plan</span>
                    <span class="text-slate-500 font-bold uppercase text-[10px] tracking-[0.2em]">MONTHLY</span>
<!-- Footer Action -->
    <div class="text-center py-10">
        <button class="bg-white text-black px-12 py-4 rounded-full font-black text-lg hover:bg-blue-500 hover:text-white transition-all">
            BUY NOW <i class="fas fa-shopping-cart ml-2"></i>
        </button>
        <p class="mt-4 text-slate-600 text-sm italic">ဖုန်းဖြင့်ကြည့်ပါက Card များကို ဘေးသို့ ဆွဲကြည့်နိုင်ပါသည်</p>
    </div>

</body>
</html>
