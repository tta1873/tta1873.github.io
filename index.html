<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Edge Design</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <header>
            <div class="brand">BLUE EDGE</div>
            <div class="help-btn">
                <span>အကူအညီရယူရန်</span>
                <i class="telegram-icon">✈️</i>
            </div>
        </header>

        <main>
            <div class="content">
                <div class="wifi-icon">📶</div>
                <h3 class="sub-title">တစ်နေရာတည်းမှာ</h3>
                <h1 class="main-title">PROTOCOL <small>အကုန်ရ</small></h1>
                
                <div class="description">
                    <p>Hysteria 2 နှင့် Vless (Reality) တို့ကို <br>
                    Plan တိုင်းမှာ စိတ်ကြိုက်ပြောင်းသုံးနိုင်ပါတယ်။</p>
                    <p>Device Limit မရှိတဲ့အပြင် <br>
                    Backup Key ပါဝင်ပြီးသားဖြစ်လို့ <br>
                    စိတ်ချလက်ချ အသုံးပြုနိုင်ပါပြီ။</p>
                </div>
                <div class="thunder-icon">⚡</div>
            </div>

            <div class="image-container">
                <img src="https://img.icons8.com/plasticine/400/lock.png" alt="Lock Icon" class="lock-img">
            </div>
        </main>
    </div>
</body>
</html>
