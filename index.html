<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Edge - Smart Protocol Layout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #050a18;
            margin: 0;
            padding: 0;
            color: white;
            overflow-x: hidden;
        }

        /* နောက်ခံ Glow Effect */
        .bg-glow {
            background: radial-gradient(circle at top right, #1e4eb8 0%, #050a18 75%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            z-index: 50;
        }

        .brand {
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        .help-btn {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #efefef;
        }

        /* Main Content */
        main {
            position: relative;
            z-index: 10;
        }

        .wifi-icon {
            background: rgba(255, 255, 255, 0.12);
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            margin-bottom: 20px;
            color: #4a90ff;
        }

        .sub-title {
            font-weight: 300;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .main-title-row {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 25px;
        }

        .main-title {
            font-size: 4rem;
            font-weight: 900;
            color: #4a90ff;
            line-height: 0.9;
            text-transform: uppercase;
        }

        .tag-small {
            font-size: 1.2rem;
            color: #888;
            font-weight: 400;
        }

        /* စာသားများကို ပုံနှင့် မထပ်အောင် ဘယ်ဘက်တွင် ကန့်သတ်ထားခြင်း */
        .description {
            font-size: 0.95rem;
            color: #9ca3af;
            line-height: 1.7;
            max-width: 65%; /* စာသား ဧရိယာကို ၆၅ ရာခိုင်နှုန်းပဲ ပေးထားသည် */
        }

        .description p {
            margin-bottom: 15px;
        }

        .thunder-icon {
            background: rgba(255, 255, 255, 0.1);
            width: 35px;
            height: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            margin-top: 10px;
            color: #ffd700;
        }

        /* သော့ပုံ (Image Container) */
        .image-container {
            position: absolute;
            right: -45px;
            top: 280px; /* စာသားနှင့် တစ်တန်းတည်း ဖြစ်စေရန် အမြင့်ညှိထားသည် */
            z-index: 1;
            pointer-events: none;
        }

        .lock-img {
            width: 310px;
            height: auto;
            filter: drop-shadow(0 15px 40px rgba(30, 78, 184, 0.4));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-4deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        /* Mobile Screen Adjustments */
        @media (max-width: 380px) {
            .main-title { font-size: 3.2rem; }
            .image-container { top: 320px; right: -60px; }
            .lock-img { width: 260px; }
            .description { max-width: 60%; }
        }
    </style>
</head>
<body class="bg-glow">

    <div class="container">
        <!-- Header အပိုင်း -->
        <header>
            <div class="brand">BLUE EDGE</div>
            <div class="help-btn">
                <span>အကူအညီရယူရန်</span>
                <!-- Telegram Icon Image အစားထိုးနိုင်သည် -->
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </div>
        </header>

        <!-- Main Content အပိုင်း -->
        <main>
            <div class="wifi-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
            </div>

            <div class="sub-title">တစ်နေရာတည်းမှာ</div>
            <div class="main-title-row">
                <h1 class="main-title">PROTOCOL</h1>
                <span class="tag-small">အကုန်ရ</span>
            </div>

            <div class="description">
                <p>Hysteria 2 နှင့် Vless (Reality) တို့ကို Plan တိုင်းမှာ စိတ်ကြိုက်ပြောင်းလဲအသုံးပြုနိုင်ပါတယ်။</p>
                <p>Device Limit မရှိတဲ့အပြင် Backup Key ပါဝင်ပြီးသားဖြစ်လို့ စိတ်ချလက်ချ အသုံးပြုနိုင်ပါပြီ။</p>
            </div>

            <div class="thunder-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h9v8l10-12h-9l1 0z"></path></svg>
            </div>
        </main>

        <!-- သော့ပုံ (ညာဘက်ခြမ်းတွင် နေရာချခြင်း) -->
        <div class="image-container">
            <!-- သင်တင်ထားသော 20260304_084442.png သို့မဟုတ် သက်ဆိုင်ရာ ပုံအမည်ကို အသုံးပြုပါ -->
            <img src="20260304_084442.png" alt="3D Lock" class="lock-img">
        </div>
    </div>

</body>
</html>
